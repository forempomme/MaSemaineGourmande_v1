name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Licences + SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # ÉTAPE CLÉ : Reconstruction du wrapper depuis le ZIP officiel
      - name: Fix Gradle Wrapper (Ultimate Fix)
        run: |
          echo "🔧 Reconstruction du Gradle Wrapper depuis la source officielle..."
          
          GRADLE_VERSION="8.11.1"
          DIST_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          WRAPPER_DEST="gradle/wrapper/gradle-wrapper.jar"
          
          mkdir -p gradle/wrapper
          
          # 1. Télécharger le ZIP officiel (lien 100% fiable)
          echo "📥 Téléchargement de la distribution complète..."
          if ! curl -fsSL "$DIST_URL" -o /tmp/gradle.zip; then
            echo "::error::Échec du téléchargement du ZIP officiel."
            exit 1
          fi
          
          # 2. Extraire le fichier gradle-wrapper.jar depuis l'intérieur du ZIP
          # Dans le ZIP, le chemin est généralement : gradle-VERSION/lib/gradle-wrapper-VERSION.jar
          # On utilise un wildcard pour être sûr de trouver le bon fichier peu importe la version mineure
          echo "📦 Extraction du gradle-wrapper.jar..."
          
          # On cherche le fichier qui contient "gradle-wrapper" dans le dossier lib
          JAR_PATH=$(unzip -l /tmp/gradle.zip | grep "lib/gradle-wrapper.*\.jar" | head -1 | awk '{print $4}')
          
          if [ -z "$JAR_PATH" ]; then
            echo "⚠ Fichier wrapper standard non trouvé, tentative avec gradle-launcher (fallback)..."
            JAR_PATH=$(unzip -l /tmp/gradle.zip | grep "lib/gradle-launcher.*\.jar" | head -1 | awk '{print $4}')
          fi
          
          if [ -n "$JAR_PATH" ]; then
            echo "Fichier trouvé dans le ZIP : $JAR_PATH"
            unzip -p /tmp/gradle.zip "$JAR_PATH" > "$WRAPPER_DEST"
            
            # Vérification de validité (doit être un vrai JAR ZIP)
            if unzip -t "$WRAPPER_DEST" > /dev/null 2>&1; then
              echo "✅ Gradle Wrapper généré avec succès !"
              ls -lh "$WRAPPER_DEST"
            else
              echo "::error::Le fichier extrait n'est pas un JAR valide."
              exit 1
            fi
          else
            echo "::error::Impossible de trouver le fichier JAR dans la distribution ZIP."
            exit 1
          fi

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Patch versionCode
        run: |
          RUN_NUM="${{ github.run_number }}"
          echo "Setting versionCode = $RUN_NUM"
          sed -i "s/versionCode\s*=.*/versionCode = $RUN_NUM/" app/build.gradle.kts
          sed -i "s/versionName\s*=.*/versionName = \"1.6.$RUN_NUM\"/" app/build.gradle.kts
          grep -A8 "defaultConfig" app/build.gradle.kts | head -10

      - name: Permissions gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
