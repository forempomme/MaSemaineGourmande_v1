name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Licences + SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # Action officielle Gradle — installe Gradle proprement, sans wrapper JAR
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Restore stable debug keystore
        run: |
          mkdir -p "$HOME/.android"
          KS_PATH="$HOME/.android/debug.keystore"
          echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > "$KS_PATH"
          echo "DEBUG_KEYSTORE_PATH=$KS_PATH" >> $GITHUB_ENV
          echo "✅ Keystore: $(stat -c%s $KS_PATH) bytes"

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Patch versionCode
        run: |
          RUN_NUM="${{ github.run_number }}"
          sed -i "s/versionCode.*=.*/versionCode   = $RUN_NUM/" app/build.gradle.kts
          sed -i "s/versionName.*=.*/versionName   = \"1.6.$RUN_NUM\"/" app/build.gradle.kts
          echo "✅ versionCode = $RUN_NUM"

      - name: Build APK
        # Utilise "gradle" directement (installé par setup-gradle), pas ./gradlew
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
