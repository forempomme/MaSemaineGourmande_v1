name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Licences + SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper

          # Télécharger la distribution complète et extraire le JAR du wrapper
          GRADLE_VERSION="8.11.1"
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -o /tmp/gradle.zip

          # Lister les JARs "wrapper" dans la distribution pour trouver le bon chemin
          JAR_PATH=$(unzip -l /tmp/gradle.zip | awk '/wrapper.*\.jar/{print $NF}' | head -1)
          echo "JAR trouvé dans le zip : $JAR_PATH"

          if [ -n "$JAR_PATH" ]; then
            unzip -p /tmp/gradle.zip "$JAR_PATH" > gradle/wrapper/gradle-wrapper.jar
          else
            # Fallback : extraire directement par glob
            unzip -p /tmp/gradle.zip \
              "gradle-${GRADLE_VERSION}/lib/gradle-wrapper-${GRADLE_VERSION}.jar" \
              > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
            unzip -j /tmp/gradle.zip \
              "gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-${GRADLE_VERSION}.jar" \
              -d gradle/wrapper/ 2>/dev/null || \
            # Dernier recours : utiliser gradle wrapper dans un projet vide
            (
              GRADLE_BIN="/tmp/gradle-${GRADLE_VERSION}/bin/gradle"
              unzip -q /tmp/gradle.zip -d /tmp/
              TMP_PROJ=$(mktemp -d)
              touch "$TMP_PROJ/settings.gradle"
              "$GRADLE_BIN" --project-dir "$TMP_PROJ" wrapper \
                --gradle-version "$GRADLE_VERSION" --distribution-type bin \
                2>&1
              cp "$TMP_PROJ/gradle/wrapper/gradle-wrapper.jar" gradle/wrapper/
            )
          fi

          # Vérification : le JAR doit commencer par PK (magic bytes ZIP/JAR)
          MAGIC=$(xxd -l 2 gradle/wrapper/gradle-wrapper.jar | awk '{print $2$3}')
          echo "Magic bytes : $MAGIC (attendu: 504b)"
          if [ "$MAGIC" != "504b" ]; then
            echo "::error::gradle-wrapper.jar invalide (magic=$MAGIC)"
            exit 1
          fi
          echo "✅ gradle-wrapper.jar OK : $(stat -c%s gradle/wrapper/gradle-wrapper.jar) bytes"

          # Vérifier que la classe principale est présente
          jar tf gradle/wrapper/gradle-wrapper.jar | grep -q "GradleWrapperMain" \
            && echo "✅ GradleWrapperMain trouvé" \
            || echo "⚠️  GradleWrapperMain absent"

      - name: Restore stable debug keystore
        run: |
          mkdir -p "$HOME/.android"
          KS_PATH="$HOME/.android/debug.keystore"
          echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > "$KS_PATH"
          echo "DEBUG_KEYSTORE_PATH=$KS_PATH" >> $GITHUB_ENV
          echo "✅ Keystore: $(stat -c%s $KS_PATH) bytes"

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Patch versionCode
        run: |
          RUN_NUM="${{ github.run_number }}"
          sed -i "s/versionCode.*=.*/versionCode   = $RUN_NUM/" app/build.gradle.kts
          sed -i "s/versionName.*=.*/versionName   = \"1.6.$RUN_NUM\"/" app/build.gradle.kts
          echo "✅ versionCode = $RUN_NUM"

      - name: Permissions gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
