name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Licences + SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # ÉTAPE CLÉ : Régénération du wrapper sans dépendre du fichier du repo
      - name: Fix Gradle Wrapper (Mobile Friendly)
        run: |
          echo "🔧 Correction du Gradle Wrapper..."
          
          # 1. Créer le dossier s'il n'existe pas
          mkdir -p gradle/wrapper
          
          # 2. Télécharger la distribution complète de Gradle (le ZIP officiel)
          # C'est beaucoup plus fiable que de télécharger le .jar seul via raw github
          GRADLE_VERSION="8.11.1"
          DIST_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          
          echo "📥 Téléchargement de la distribution Gradle ${GRADLE_VERSION}..."
          curl -fsSL "$DIST_URL" -o /tmp/gradle-dist.zip
          
          # 3. Extraire UNIQUEMENT le fichier gradle-wrapper.jar depuis le ZIP
          # Le chemin dans le ZIP est : gradle-VERSION/lib/plugins/gradle-wrapper-VERSION.jar 
          # OU parfois directement dans lib selon les versions. On cherche le bon fichier.
          # Pour simplifier, on va extraire le fichier 'gradle-wrapper.jar' s'il existe, 
          # sinon on utilise une astuce : copier le launcher et le renommer, ou mieux :
          # Utiliser le script 'gradle' du ZIP pour générer le wrapper proprement.
          
          # Méthode la plus simple et robuste : Extraire le jar depuis le dossier lib du ZIP décompressé
          unzip -q /tmp/gradle-dist.zip "gradle-${GRADLE_VERSION}/lib/gradle-launcher-*.jar" -d /tmp/
          
          # Le fichier extrait s'appelle gradle-launcher-X.X.jar, mais nous avons besoin du wrapper.
          # En réalité, le moyen le plus sûr sans gradle local est de télécharger le jar depuis un CDN tiers fiable
          # ou de recréer le jar minimal.
          
          # ASTUCE ULTIME : Le fichier gradle-wrapper.jar est standard. 
          # On va le télécharger depuis un dépôt Maven public qui gère bien les binaires.
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          MAVEN_URL="https://repo.gradle.org/gradle/libs-releases/org/gradle/gradle-wrapper/${GRADLE_VERSION}/gradle-wrapper-${GRADLE_VERSION}.jar"
          
          # Tentative depuis Maven Gradle
          if curl -fsSL "$MAVEN_URL" -o "$WRAPPER_JAR"; then
             if [ -s "$WRAPPER_JAR" ]; then
               echo "✓ Wrapper téléchargé depuis Maven Gradle."
             else
               echo "⚠ Fichier Maven vide, tentative alternative..."
               # Alternative : Utiliser le jar d'une version précédente connue pour être compatible (le wrapper change peu)
               curl -fsSL "https://raw.githubusercontent.com/robolectric/robolectric/master/gradle/wrapper/gradle-wrapper.jar" -o "$WRAPPER_JAR" || true
             fi
          else
             echo "⚠ Échec Maven, tentative depuis un miroir..."
             # Miroir alternatif fiable
             curl -fsSL "https://services.gradle.org/distributions-snapshots/gradle-wrapper.jar" -o "$WRAPPER_JAR" 2>/dev/null || \
             curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar" -o "$WRAPPER_JAR"
          fi
          
          # Vérification finale de la taille (doit faire > 50ko)
          if [ ! -s "$WRAPPER_JAR" ] || [ $(stat -c%s "$WRAPPER_JAR") -lt 50000 ]; then
             echo "::error::Échec critique : Impossible de récupérer un gradle-wrapper.jar valide."
             echo "Le fichier fait $(stat -c%s "$WRAPPER_JAR") octets."
             exit 1
          fi
          
          echo "✅ Gradle Wrapper réparé avec succès (Taille: $(stat -c%s "$WRAPPER_JAR") octets)"

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Patch versionCode
        run: |
          RUN_NUM="${{ github.run_number }}"
          echo "Setting versionCode = $RUN_NUM"
          sed -i "s/versionCode\s*=.*/versionCode = $RUN_NUM/" app/build.gradle.kts
          sed -i "s/versionName\s*=.*/versionName = \"1.6.$RUN_NUM\"/" app/build.gradle.kts
          grep -A8 "defaultConfig" app/build.gradle.kts | head -10

      - name: Permissions gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
