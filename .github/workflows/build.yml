name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Licences + SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Regenerate Gradle Wrapper
        run: |
          GRADLE_VERSION="8.11.1"
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          "/tmp/gradle-${GRADLE_VERSION}/bin/gradle" wrapper --gradle-version "$GRADLE_VERSION" --distribution-type bin
          echo "✅ Wrapper: $(stat -c%s gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Restore stable debug keystore
        # Ensures the APK is always signed with the same key → installation par-dessus possible
        run: |
          mkdir -p "$HOME/.android"
          echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > "$HOME/.android/debug.keystore"
          echo "✅ Keystore restauré"

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Patch versionCode
        run: |
          RUN_NUM="${{ github.run_number }}"
          sed -i "s/versionCode\s*=.*/versionCode = $RUN_NUM/" app/build.gradle.kts
          sed -i "s/versionName\s*=.*/versionName = \"1.6.$RUN_NUM\"/" app/build.gradle.kts
          echo "versionCode = $RUN_NUM"

      - name: Permissions gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          
