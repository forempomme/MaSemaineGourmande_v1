name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Licences + SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Force download gradle-wrapper.jar
        # Toujours re-télécharger — évite un JAR corrompu ou absent dans le repo
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          # Vérification : le JAR doit commencer par PK (magic bytes d'un ZIP/JAR)
          hexdump -C gradle/wrapper/gradle-wrapper.jar | head -1

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Patch versionCode
        run: |
          RUN_NUM="${{ github.run_number }}"
          echo "Setting versionCode = $RUN_NUM"
          sed -i "s/versionCode\s*=.*/versionCode = $RUN_NUM/" app/build.gradle.kts
          sed -i "s/versionName\s*=.*/versionName = \"1.6.$RUN_NUM\"/" app/build.gradle.kts
          grep -A8 "defaultConfig" app/build.gradle.kts | head -10

      - name: Permissions gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          
