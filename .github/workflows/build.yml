name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Licences + SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Regenerate Gradle Wrapper
        run: |
          GRADLE_VERSION="8.11.1"
          # Télécharger la distribution Gradle
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          GRADLE_BIN="/tmp/gradle-${GRADLE_VERSION}/bin/gradle"
          # Exécuter "gradle wrapper" dans un dossier VIDE pour éviter
          # que build.gradle.kts du projet ne soit lu (Android plugin non résolu)
          TMPDIR_WORK=$(mktemp -d)
          "$GRADLE_BIN" --project-dir "$TMPDIR_WORK" wrapper \
            --gradle-version "$GRADLE_VERSION" --distribution-type bin
          # Copier le JAR et les properties dans le projet
          mkdir -p gradle/wrapper
          cp "$TMPDIR_WORK/gradle/wrapper/gradle-wrapper.jar"        gradle/wrapper/gradle-wrapper.jar
          cp "$TMPDIR_WORK/gradle/wrapper/gradle-wrapper.properties" gradle/wrapper/gradle-wrapper.properties
          echo "✅ Wrapper: $(stat -c%s gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Restore stable debug keystore
        run: |
          mkdir -p "$HOME/.android"
          KS_PATH="$HOME/.android/debug.keystore"
          echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > "$KS_PATH"
          echo "DEBUG_KEYSTORE_PATH=$KS_PATH" >> $GITHUB_ENV
          echo "✅ Keystore: $(stat -c%s $KS_PATH) bytes"
          keytool -list -keystore "$KS_PATH" -storepass android 2>&1 | grep -i "alias\|SHA\|finger" | head -5

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Patch versionCode
        run: |
          RUN_NUM="${{ github.run_number }}"
          sed -i "s/versionCode.*=.*/versionCode   = $RUN_NUM/" app/build.gradle.kts
          sed -i "s/versionName.*=.*/versionName   = \"1.6.$RUN_NUM\"/" app/build.gradle.kts
          echo "✅ versionCode = $RUN_NUM"

      - name: Permissions gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
