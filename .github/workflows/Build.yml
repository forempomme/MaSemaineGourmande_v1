name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # corrige le warning Node.js 20

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Télécharger gradle-wrapper.jar si absent
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "gradle-wrapper.jar manquant — téléchargement…"
            mkdir -p gradle/wrapper
            GRADLE_VERSION="8.11.1"
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -o "$WRAPPER_JAR"
          else
            echo "gradle-wrapper.jar présent ✓"
          fi

      - name: Installer le SDK Android
        run: |
          sudo apt-get update -q
          sudo apt-get install -y wget unzip
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q "$CMDLINE_TOOLS_URL" -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accepter les licences et installer les composants
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Permissions gradlew
        run: chmod +x gradlew

      - name: Build APK debug
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Uploader l'APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
